<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festivite | Formulário de convite</title>

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Leckerli+One&family=Open+Sans:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>

    <div class="container-page">

        <header id="header-page">
            
            <img src="assets/icons/Logo.svg" id="logo" alt="">
            <h1>
                Festivite
            </h1>
            <p>
                Crie um convite digital para o seu evento
            </p>
            
        </header>
        
        <main>
            
            <h2>Crie seu convite</h2>

            <form action="">

                <fieldset>
                    <legend>Sobre o evento</legend>
                    <img src="assets/icons/calendar.svg" alt="">

                    <label for="title">Título</label>
                    <input type="text" name="nomeDoEvento" id="title">

                    <label for="start">Início</label>
                    <input type="datetime-local" name="início" id="start">

                    <label for="end">Fim</label>
                    <input type="datetime-local" name="" id="">

                    
                </fieldset>

            </form>
            
        </main>

    </div>

</body>
</html>
